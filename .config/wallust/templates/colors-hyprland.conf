## Auto-generated via Matugen. ##

$primary    = rgb({{color2 | strip}})
$outline    = rgb({{color4 | strip}})
$error      = rgb({{color6 | strip}})
$background = rgb({{background | strip}})

general {
  col.active_border   = $primary
  col.inactive_border = $outline
}

group {
  col.border_active          = $primary
  col.border_inactive        = $outline
  col.border_locked_active   = $error
  col.border_locked_inactive = $outline

  groupbar {
    col.active          = $primary
    col.inactive        = $outline
    col.locked_active   = $error
    col.locked_inactive = $outline
    text_color          = $primary
    text_color_inactive = $outline
    }
}
