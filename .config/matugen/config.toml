[config]
version_check = false
fallback_color = "#ffbf9b"
caching = false
expr_prefix = "{{"
expr_postfix = "}}"
block_prefix = "<*"
block_postfix = "*>"

[templates.matugen]
input_path = './templates/colors.css'
output_path = '/dev/null'

[templates.emacs]
input_path = './templates/colors.css'
output_path = '~/.emacs.d/colors.css'

[templates.foot]
input_path = './templates/foot-colors.ini'
output_path = '~/.config/foot/colors.ini'

[templates.hyprland]
input_path = "./templates/hyprland-colors.conf"
output_path = "~/.config/hypr/colors.conf"

[templates.kitty]
input_path = './templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors.conf'
post_hook = 'kill -SIGUSR1 $KITTY_PID'

[templates.nwg-drawer]
input_path = "./templates/nwg-drawer.css"
output_path= "~/.config/nwg-drawer/drawer.css"

[templates.waybar]
input_path = "./templates/colors.css"
output_path = "~/.config/waybar/colors.css"
post_hook = 'pkill -SIGUSR2 waybar'

[templates.wlogout]
input_path = './templates/colors.css'
output_path = '~/.config/wlogout/colors.css'

[templates.gtk3]
input_path = './templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path = './templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.dmsqt5ct]
input_path = "templates/qtct-colors.conf"
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.dmsqt6ct]
input_path = "./templates/qtct-colors.conf"
output_path = '~/.config/qt6ct/colors/matugen.conf'
